<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fashion Store</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<header>
    <h1>Fashion Store</h1>
    <nav>
        <a href="#">Home</a>
        <a href="#products">Products</a>
        <a href="#about">About</a>
        <a href="#contact">Contact</a>
    </nav>
</header>

<section class="hero">
    <h2>New Collection 2026</h2>
    <p>Stylish Clothes for Men & Women</p>
    <button onclick="shopNow()">Shop Now</button>
</section>

<section id="products" class="products">
    <div class="card">
        <img src="https://via.placeholder.com/250x300" alt="Shirt">
        <h3>Casual Shirt</h3>
        <p>₹999</p>
        <button>Add to Cart</button>
    </div>

    <div class="card">
        <img src="https://via.placeholder.com/250x300" alt="T-Shirt">
        <h3>T-Shirt</h3>
        <p>₹699</p>
        <button>Add to Cart</button>
    </div>

    <div class="card">
        <img src="https://via.placeholder.com/250x300" alt="Jeans">
        <h3>Jeans</h3>
        <p>₹1499</p>
        <button>Add to Cart</button>
    </div>
</section>

<footer id="contact">
    <p>© 2026 Fashion Store | Contact: +91 9876543210</p>
</footer>

<script src="script.js"></script>
</body>
</html>
